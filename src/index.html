<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Портфолио Дмитрия Ледовских</title>
</head>
<body class="page">
  <header class="header">
    <div class="container">
      <div class="header__row">
        <a href="./index.html" class="logo link">Портфолио Дмитрия Ледовских</a>
        <nav class="header__nav">
          <ul class="menu header__menu">
            <li class="menu__item">
              <a href="#intro" class="menu__link link menu__link_active">Обо мне</a>
            </li>
            <li class="menu__item">
              <a href="#projects" class="menu__link link">Проекты</a>
            </li>
            <li class="menu__item">
              <a href="#skills" class="menu__link link">Навыки</a>
            </li>
            <li class="menu__item">
              <a href="#contacts" class="menu__link link">Контакты</a>
            </li>
          </ul>
        </nav>
        <button class="burger" type="button">
          <span class="burger__line"></span>
        </button>
      </div>
    </div>
  </header>
  <main class="content">
    <section class="intro" id="intro">
      <div class="container">
        <h1 class="title title_size_x intro__title">Привет, меня зовут Дмитрий Ледовских</h1>
        <p class="intro__subtitle">Я <span lang="en">Junior</span> веб разработчик</p>
      </div>
    </section>
    <section class="projects section" id="projects">
      <div class="container">
        <h2 class="title title_size_m section__title projects__title">Мои проекты</h2>
        <div class="projects__cards"></div>
      </div>
    </section>
    <section class="skills section" id="skills">
      <div class="container">
        <h2 class="title title_size_m section__title skills__title">Мои навыки</h2>
        <ul class="skills__list">
          <li class="skills__list-item skills__list-item_type_html" title="HTML" lang="en">
            Html
          </li>
          <li class="skills__list-item skills__list-item_type_css" title="CSS" lang="en">
            Css
          </li>
          <li class="skills__list-item skills__list-item_type_js" title="JavaScript" lang="en">
            Js
          </li>
          <li class="skills__list-item skills__list-item_type_git" title="Git" lang="en">
            Git
          </li>
          <li class="skills__list-item skills__list-item_type_webpack" title="Webpack" lang="en">
            Webpack
          </li>
          <li class="skills__list-item skills__list-item_type_bem" title="Бэм">
            Бэм
          </li>
        </ul>
      </div>
    </section>
    <section class="contacts section" id="contacts">
      <div class="container">
        <h2 class="title title_size_m section__title contacts__title">Контакты</h2>
        <ul class="social">
          <li class="social__item">
            <a href="https://vk.com/ledovskihdmitriy" class="social__link social__link_type_vk" target="_blank" rel="noopener noreferrer">
              Вконтакте
            </a>
          </li>
          <li class="social__item">
            <a href="https://t.me/dmitriyledovskih" class="social__link social__link_type_tg" target="_blank" rel="noopener noreferrer">
              Телеграм
            </a>
          </li>
          <li class="social__item">
            <a href="https://github.com/DmitriyLedovskih" class="social__link social__link_type_github" target="_blank" rel="noopener noreferrer">
              Гитхаб
            </a>
          </li>
        </ul>
      </div>
    </section>
  </main>
  <footer class="footer">
    <div class="container">
      <p class="footer__text">
        Автор Дмитрий Ледовских
      </p>
    </div>
  </footer>
  <div class="popup popup_type_image">
    <figure class="popup__container-figure">
      <button class="popup__close-button"></button>
      <img src="<%=require('./images/intro-bg.jpg')%>" alt="Изображение" class="popup__container-image">
      <figcaption class="popup__container-label">
        <a href="#" class="popup__container-link link" target="_blank" rel="noreferrer noopener"></a>
      </figcaption>
    </figure>
  </div>
  <template class="card-template">
    <article class="projects__card">
      <img src="<%=require('./images/project-how-to-learn.png')%>" alt="Проект научиться учиться" class="projects__card-image">
      <h3 class="projects__card-label">
        <a href="https://dmitriyledovskih.github.io/how-to-learn/" class="projects__card-link link" target="_blank" rel="noopener noreferrer">
          Научиться учиться
        </a>
      </h3>
    </article>
  </template>
</body>
</html>
